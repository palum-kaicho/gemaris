<h1>

応募フォーム

</h1>

<p class="hero-text">

あなたの挑戦をお待ちしています。

</p>

</div>

</section>

<section class="section">

<div class="container">

<div class="company-link-card">

<h2>

応募情報入力

</h2>

<form
action="submit_form.php"
method="POST">

<label>

応募職種

</label>

<select
name="role"
required>

<option value="">
選択してください
</option>

<option value="ライバー">
ライバー
</option>

<option value="ライバー兼マネージャー">
ライバー兼マネージャー
</option>

<option value="スカウト">
スカウト
</option>

</select>

<br><br>

<label>

お名前

</label>

<input
type="text"
name="name"
required>

<br><br>

<label>

年齢

</label>

<input
type="number"
name="age"
min="13"
required>

<br><br>

<label>

メールアドレス

</label>

<input
type="email"
name="email"
required>

<br><br>

<label>

配信経験・自己PR

</label>

<textarea
name="experience"
rows="8"
required></textarea>

<br><br>

<button
type="submit"
class="button apply-button">

応募する

</button>

</form>

</div>

</div>
