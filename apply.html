if($_SERVER["REQUEST_METHOD"]=="POST") {
    $role = htmlspecialchars($_POST['role']);
    $name = htmlspecialchars($_POST['name']);
    $age = htmlspecialchars($_POST['age']);
    $email = htmlspecialchars($_POST['email']);
    $experience = htmlspecialchars($_POST['experience']);

    // CSVに保存（応募者データをサーバーに保存）
    $file = 'applications.csv';
    $data = [$role, $name, $age, $email, $experience, date("Y-m-d H:i:s")];
    $fp = fopen($file, 'a');
    fputcsv($fp, $data);
    fclose($fp);

    // 管理者へ通知メール
    $admin_email = "info@wwwgemaris.com"; // ここを管理者メールに変更
    $subject = "新規応募：$name ($role)";
    $message = "応募情報\n\n職種: $role\n名前: $name\n年齢: $age\nメール: $email\n自己PR:\n$experience\n";
    $headers = "From: info@wwwgemaris.com";
    mail($admin_email, $subject, $message, $headers);

    // 応募者へ自動返信メール
    $user_subject = "【Gemaris】応募ありがとうございます";
    $user_message = "$name 様\n\nこの度はGemarisへのご応募ありがとうございます。\n内容を確認のうえ、担当より追ってご連絡いたします。\n\nGemaris運営事務局";
    $user_headers = "From: info@wwwgemaris.com";
    mail($email, $user_subject, $user_message, $user_headers);

    // 完了画面
    echo "<!DOCTYPE html>
    <html lang='ja'>
    <head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>

}
